<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taylor — Engineer</title>


  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --ink: #000000;
      --mid: #888888;
      --light: #e0e0e0;
      --serif: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      --sans: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      --mono: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 400;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 48px;
    }
    .nav-name {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 40px;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .nav-links a:hover { opacity: 1; }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 48px 64px;
      position: relative;
    }

    .hero-top {
      position: absolute;
      top: 120px;
      left: 48px;
      right: 48px;
    }

    .hero-title {
      font-family: var(--sans);
      font-size: clamp(36px, 5.5vw, 76px);
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: -0.03em;
      max-width: 820px;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.5s;
    }

    .hero-title .intro-line {
      display: block;
      font-size: clamp(28px, 4vw, 56px);
      font-weight: 300;
      color: var(--mid);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .cycling-wrapper {
      display: inline-block;
      position: relative;
      vertical-align: bottom;
    }

    .cycling-word {
      display: inline-block;
      color: var(--ink);
      font-weight: 700;
      position: relative;
      white-space: nowrap;
    }

    #greeting-word {
      display: inline-block;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    #greeting-word.fade-out {
      opacity: 0;
      transform: translateY(-6px);
    }

    .cursor-bar {
      display: inline-block;
      width: 3px;
      height: 0.85em;
      background: var(--ink);
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 0.9s step-end infinite;
      position: relative;
      top: -2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* CAROUSEL SECTION */
    .carousel-wrapper {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-42%);
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards 0.9s;
    }

    #carousel-scene {
      width: 100%;
      height: 420px;
      perspective: 1000px;
      position: relative;
    }

    #carousel-ring {
      width: 100%;
      height: 100%;
      position: absolute;
      transform-style: preserve-3d;
    }

    .card {
      position: absolute;
      width: 160px;
      height: 210px;
      top: 50%;
      left: 50%;
      margin-top: -105px;
      margin-left: -80px;
      border-radius: 0;
      overflow: visible;
      cursor: default;
      backface-visibility: hidden;
      background: transparent;
    }

    .card-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 12px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover .card-label { opacity: 1; }

    /* HERO BOTTOM */
    .hero-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .hero-desc {
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 300;
      color: var(--mid);
      max-width: 280px;
      line-height: 1.6;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.1s;
    }

    /* DIVIDER */
    .divider {
      width: calc(100% - 96px);
      margin: 0 48px;
      height: 1px;
      background: var(--light);
    }

    /* ABOUT SECTION */
    .about {
      padding: 120px 48px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--light);
    }

    .about-text {
      font-family: var(--sans);
      font-size: clamp(26px, 3.2vw, 42px);
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .about-text em {
      font-style: normal;
      font-weight: 300;
      color: var(--mid);
    }

    .about-right { padding-top: 60px; }

    .stack-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .stack-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 0;
      border-bottom: 1px solid var(--light);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .stack-item span {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--mid);
      letter-spacing: 0.06em;
    }

    /* WORK SECTION */
    .work { padding: 40px 48px 120px; }

    .work-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      margin-top: 48px;
    }

    .work-item {
      position: relative;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: #f0f0f0;
    }

    .work-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease, filter 0.4s;
      filter: grayscale(30%);
    }

    .work-item:hover img { transform: scale(1.04); filter: grayscale(0%); }

    .work-item-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 24px 20px 20px;
      background: linear-gradient(transparent, rgba(0,0,0,0.65));
      transform: translateY(8px);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
    }

    .work-item:hover .work-item-info { opacity: 1; transform: translateY(0); }

    .work-item-title {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .work-item-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* LIFE SECTION */
    .life { padding: 40px 48px 120px; }

    .life-intro {
      margin-top: 48px;
      margin-bottom: 64px;
      max-width: 640px;
    }

    .life-intro-text {
      font-size: clamp(22px, 3vw, 36px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.025em;
    }

    .life-intro-text em {
      font-weight: 300;
      font-style: normal;
      color: var(--mid);
    }

    .life-pillars {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }

    .pillar {
      padding: 40px 32px;
      border: 1px solid var(--light);
      transition: background 0.3s;
    }

    .pillar:hover { background: var(--ink); }

    .pillar-number {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--mid);
      letter-spacing: 0.1em;
      margin-bottom: 32px;
      transition: color 0.3s;
    }

    .pillar:hover .pillar-number { color: rgba(255,255,255,0.4); }

    .pillar-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      transition: color 0.3s;
    }

    .pillar:hover .pillar-title { color: #fff; }

    .pillar-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pillar-items li {
      font-size: 13px;
      color: var(--mid);
      transition: color 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pillar:hover .pillar-items li { color: rgba(255,255,255,0.65); }

    .pillar-items li::before {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--light);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .pillar:hover .pillar-items li::before { background: rgba(255,255,255,0.3); }

    .pillar-stat {
      margin-top: 28px;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--ink);
      letter-spacing: 0.06em;
      padding: 6px 12px;
      border: 1px solid var(--ink);
      display: inline-block;
      transition: color 0.3s, border-color 0.3s, background 0.3s;
    }

    .pillar:hover .pillar-stat { color: var(--ink); background: #fff; border-color: #fff; }

    /* BLOG SECTION */
    .blog { padding: 40px 48px 120px; }

    .blog-list {
      margin-top: 48px;
      display: flex;
      flex-direction: column;
    }

    .blog-item {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 32px;
      align-items: center;
      padding: 28px 0;
      border-bottom: 1px solid var(--light);
      text-decoration: none;
      color: var(--ink);
      transition: padding-left 0.3s;
    }

    .blog-item:hover { padding-left: 12px; }

    .blog-date {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--mid);
      letter-spacing: 0.06em;
    }

    .blog-title {
      font-family: var(--sans);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .blog-arrow {
      font-size: 18px;
      color: var(--mid);
      transition: transform 0.3s, color 0.3s;
    }

    .blog-item:hover .blog-arrow { transform: translateX(4px); color: var(--ink); }

    /* FOOTER */
    footer {
      padding: 48px 48px 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--light);
    }

    .footer-name {
      font-family: var(--sans);
      font-size: 18px;
      font-weight: 300;
      letter-spacing: -0.01em;
      color: var(--mid);
    }

    .footer-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .footer-links a {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--ink); }

    .footer-copy {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--light);
      letter-spacing: 0.06em;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    .reveal-stagger > * {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal-stagger.visible > *:nth-child(1) { opacity:1; transform:none; transition-delay:0s; }
    .reveal-stagger.visible > *:nth-child(2) { opacity:1; transform:none; transition-delay:0.1s; }
    .reveal-stagger.visible > *:nth-child(3) { opacity:1; transform:none; transition-delay:0.2s; }
    .reveal-stagger.visible > *:nth-child(4) { opacity:1; transform:none; transition-delay:0.3s; }
    .reveal-stagger.visible > *:nth-child(5) { opacity:1; transform:none; transition-delay:0.4s; }
    .reveal-stagger.visible > *:nth-child(6) { opacity:1; transform:none; transition-delay:0.5s; }

    @media (max-width: 768px) {
      nav { padding: 20px 24px; }
      .hero { padding: 0 24px 48px; }
      .hero-top { left: 24px; right: 24px; top: 90px; }
      .about { grid-template-columns: 1fr; gap: 48px; padding: 80px 24px; }
      .work { padding: 40px 24px 80px; }
      .work-grid { grid-template-columns: 1fr 1fr; }
      .life { padding: 40px 24px 80px; }
      .life-pillars { grid-template-columns: 1fr; }
      .blog { padding: 40px 24px 80px; }
      .blog-item { grid-template-columns: 60px 1fr auto; gap: 16px; }
      footer { padding: 32px 24px; flex-direction: column; gap: 24px; text-align: center; }
      .divider { width: calc(100% - 48px); margin: 0 24px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="#" class="nav-name">Taylor</a>
    <ul class="nav-links">
      <li><a href="#work">Work</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#life">Life</a></li>
      <li><a href="#blog">Writing</a></li>
      <li><a href="mailto:hello@taylor.dev">Contact</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-top">
      <h1 class="hero-title">
        <span class="intro-line"><span id="greeting-word">Hi</span>, I'm Taylor —</span>
        a <span class="cycling-wrapper"><span class="cycling-word" id="cycling-word"></span><span class="cursor-bar"></span></span>
      </h1>
    </div>

    <div class="carousel-wrapper">
      <div id="carousel-scene">
        <div id="carousel-ring"></div>
      </div>
    </div>

    <div class="hero-bottom">
      <p class="hero-desc"></p>
    </div>
  </section>

  <div class="divider"></div>

  <!-- FOOTER -->
  <footer>
    <!-- <span class="footer-name">Taylor</span> -->
    <ul class="footer-links">
      <li><a href="https://github.com" target="_blank">GitHub</a></li>
      <li><a href="https://linkedin.com" target="_blank">LinkedIn</a></li>
      <li><a href="mailto:hello@taylor.dev">Email</a></li>
    </ul>
    <span class="footer-copy">2026</span>
  </footer>

  <script>
    // CYCLING TEXT
    const words = [
      'software engineer',
      'painter',
      'ceramist',
      'runner',
      'traveler',
      'problem solver',
      'art enthusiast',
    ];

    const el = document.getElementById('cycling-word');
    let wordIndex = 0;
    let charIndex = 0;
    let deleting = false;

    const TYPE_SPEED   = 68;
    const DELETE_SPEED = 38;
    const PAUSE_AFTER  = 320;
    const PAUSE_BEFORE = 320;

    function type() {
      const word = words[wordIndex];
      if (!deleting) {
        el.textContent = word.slice(0, charIndex + 1);
        charIndex++;
        if (charIndex === word.length) {
          deleting = true;
          setTimeout(type, PAUSE_AFTER);
          return;
        }
      } else {
        el.textContent = word.slice(0, charIndex - 1);
        charIndex--;
        if (charIndex === 0) {
          deleting = false;
          wordIndex = (wordIndex + 1) % words.length;
          setTimeout(type, PAUSE_BEFORE);
          return;
        }
      }
      setTimeout(type, deleting ? DELETE_SPEED : TYPE_SPEED);
    }
    setTimeout(type, 1200);

    // GREETING CYCLE
    const greetings = ['Hi', 'Hola', '안녕하세요', 'Xin chào', 'こんにちは'];
    const greetingEl = document.getElementById('greeting-word');
    let greetingIndex = 0;

    function cycleGreeting() {
      greetingEl.classList.add('fade-out');
      setTimeout(() => {
        greetingIndex = (greetingIndex + 1) % greetings.length;
        greetingEl.textContent = greetings[greetingIndex];
        greetingEl.classList.remove('fade-out');
      }, 420);
    }
    setInterval(cycleGreeting, 3000);

    // 3D CAROUSEL
    const ring = document.getElementById('carousel-ring');
    const BASE = 'https://raw.githubusercontent.com/tayl0rn/taylor-dev/main/';

    const images = [
      { src: 'eevee1.png', label: '' },
      { src: 'eevee2.png', label: '' },
      { src: 'eevee3.png', label: '' },
      { src: 'eevee4.png', label: '' },
      { src: 'eevee5.png', label: '' },
      { src: 'eevee6.png', label: '' },
      { src: 'eevee7.png', label: '' },
    ];

    const radiusX = 340;
    const radiusZ = 120;
    const N = images.length;

    images.forEach((item) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.backgroundImage    = `url(${BASE}${item.src})`;
      card.style.backgroundSize     = 'cover';
      card.style.backgroundPosition = 'center';
      if (item.label) {
        const lbl = document.createElement('div');
        lbl.className = 'card-label';
        lbl.textContent = item.label;
        card.appendChild(lbl);
      }
      ring.appendChild(card);
    });

    // Animate rotation
    let angle = 0;
    let speed = 0.003;
    let targetSpeed = 0.003;

    const scene = document.getElementById('carousel-scene');
    scene.addEventListener('mouseenter', () => { targetSpeed = 0; });
    scene.addEventListener('mouseleave', () => { targetSpeed = 0.003; });

    function updateCarousel() {
      speed += (targetSpeed - speed) * 0.05;
      angle += speed;
      const cards = ring.querySelectorAll('.card');
      cards.forEach((card, i) => {
        const a = angle + (i / N) * Math.PI * 2;
        const x = Math.sin(a) * radiusX;
        const z = Math.cos(a) * radiusZ;
        const scale = 0.55 + ((z + radiusZ) / (radiusZ * 2)) * 0.55;
        const opacity = 0.4 + ((z + radiusZ) / (radiusZ * 2)) * 0.6;
        card.style.transform = `translate3d(${x}px, 0, ${z}px) scale(${scale})`;
        card.style.opacity = opacity;
        card.style.zIndex = Math.round(scale * 10);
      });
      requestAnimationFrame(updateCarousel);
    }
    updateCarousel();

    // SCROLL REVEAL
    const reveals = document.querySelectorAll('.reveal, .reveal-stagger');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.15 });
    reveals.forEach(el => observer.observe(el));
  </script>
</body>
</html>
