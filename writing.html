<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing — Taylor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --ink: #000000;
      --mid: #888888;
      --light: #e0e0e0;
      --sans: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      --mono: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 400;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 48px;
      background: var(--bg);
    }
    .nav-name {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 40px;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .nav-links a:hover { opacity: 1; }
    .nav-links a.active { opacity: 1; }

    /* PAGE */
    .page {
      padding: 140px 48px 120px;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 64px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--light);
    }

    /* BLOG LIST */
    .blog-list {
      display: flex;
      flex-direction: column;
    }

    .blog-item {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 32px;
      align-items: center;
      padding: 28px 0;
      border-bottom: 1px solid var(--light);
      text-decoration: none;
      color: var(--ink);
      transition: padding-left 0.3s;
    }

    .blog-item:first-child { border-top: 1px solid var(--light); }
    .blog-item:hover { padding-left: 12px; }

    .blog-date {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--mid);
      letter-spacing: 0.06em;
    }

    .blog-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .blog-arrow {
      font-size: 18px;
      color: var(--mid);
      transition: transform 0.3s, color 0.3s;
    }

    .blog-item:hover .blog-arrow { transform: translateX(4px); color: var(--ink); }

    /* FOOTER */
    footer {
      padding: 48px 48px 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--light);
    }

    .footer-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .footer-links a {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--ink); }

    .footer-copy {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--light);
      letter-spacing: 0.06em;
    }

    @media (max-width: 768px) {
      nav { padding: 20px 24px; }
      .page { padding: 100px 24px 80px; }
      .blog-item { grid-template-columns: 60px 1fr auto; gap: 16px; }
      footer { padding: 32px 24px; flex-direction: column; gap: 24px; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-name">Taylor</a>
    <ul class="nav-links">
      <li><a href="work.html">Work</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="life.html">Life</a></li>
      <li><a href="writing.html" class="active">Writing</a></li>
      <li><a href="mailto:hello@taylor.dev">Contact</a></li>
    </ul>
  </nav>

  <main class="page">
    <div class="section-label">Writing</div>
    <div class="blog-list">
      <!-- To add a new post: duplicate blog/first-post.html, rename it, edit the content,
           then add a new <a class="blog-item"> row below pointing to that file. -->
      <a class="blog-item" href="blog/first-post.html">
        <span class="blog-date">Apr 2026</span>
        <span class="blog-title">Your first post title</span>
        <span class="blog-arrow">→</span>
      </a>
      <a class="blog-item" href="blog/second-post.html">
        <span class="blog-date">Mar 2026</span>
        <span class="blog-title">Another post title</span>
        <span class="blog-arrow">→</span>
      </a>
    </div>
  </main>

  <footer>
    <ul class="footer-links">
      <li><a href="https://github.com" target="_blank">GitHub</a></li>
      <li><a href="https://linkedin.com" target="_blank">LinkedIn</a></li>
      <li><a href="mailto:hello@taylor.dev">Email</a></li>
    </ul>
    <span class="footer-copy">2026</span>
  </footer>

</body>
</html>
